spring:
  application:
    name: enterprise

  datasource:
    url: jdbc:postgresql://your-supabase-host:5432/postgres?sslmode=require
    username: postgres
    password: YOUR_DB_PASSWORD
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: YOUR_JWT_SECRET_KEY_MIN_32_CHARS
server:
  port: ${PORT:8081}
